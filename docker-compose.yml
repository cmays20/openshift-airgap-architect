version: "3.9"
services:
  backend:
    build:
      context: ./backend
      dockerfile: Containerfile
    environment:
      - PORT=4000
      - DATA_DIR=/data
      - REGISTRY_AUTH_FILE=/data/registry-auth.json
      - MOCK_MODE=${MOCK_MODE:-false}
    volumes:
      - backend-data:/data
    ports:
      - "4000:4000"
    stop_grace_period: 5s
    stop_signal: SIGTERM
  frontend:
    build:
      context: ./frontend
      dockerfile: Containerfile
    environment:
      - VITE_API_BASE=http://localhost:4000
    ports:
      - "5173:5173"
    depends_on:
      - backend
    stop_grace_period: 5s
    stop_signal: SIGTERM
volumes:
  backend-data:
