# Canonical minimal install-config for bare-metal Agent-Based Installer (4.20).
# Source: Red Hat 4.20 "Installation configuration parameters for the Agent-based Installer" Ch 9.1,
#   https://docs.redhat.com/en/documentation/openshift_container_platform/4.20/html/installing_an_on-premise_cluster_with_the_agent-based_installer/installation-config-parameters-agent
apiVersion: v1
baseDomain: example.com
metadata:
  name: agent-cluster
compute:
  - name: worker
    replicas: 0
controlPlane:
  name: master
  replicas: 3
networking:
  networkType: OVNKubernetes
  machineNetwork:
    - cidr: 10.0.0.0/16
  clusterNetwork:
    - cidr: 10.128.0.0/14
      hostPrefix: 23
  serviceNetwork:
    - 172.30.0.0/16
platform:
  baremetal: {}
pullSecret: '{"auths":{}}'
sshKey: ''
