# Bare metal UPI: controlPlane.platform and compute[].platform must be "none" (4.20).
# Source: installing on bare metal user-provisioned infrastructure.
# https://docs.redhat.com/en/documentation/openshift_container_platform/4.20/html/installing_on_bare_metal/user-provisioned-infrastructure
apiVersion: v1
baseDomain: example.com
metadata:
  name: airgap-cluster
compute:
  - name: worker
    replicas: 0
    platform: none
controlPlane:
  name: master
  replicas: 3
  platform: none
networking:
  networkType: OVNKubernetes
  machineNetwork:
    - cidr: 10.90.0.0/24
  clusterNetwork:
    - cidr: 10.128.0.0/14
      hostPrefix: 23
  serviceNetwork:
    - 172.30.0.0/16
platform:
  baremetal:
    apiVIP: 192.168.1.100
    ingressVIP: 192.168.1.101
pullSecret: '{"auths":{}}'
sshKey: ''
