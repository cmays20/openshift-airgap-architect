# install-config imageDigestSources (disconnected/mirror). 4.20 docs: imageDigestSources replaces imageContentSources.
# Standard: multiple sources; each source can have multiple mirrors. Source: disconnected install, mirroring.
# https://docs.redhat.com/en/documentation/openshift_container_platform/4.20/html/disconnected_environments/
imageDigestSources:
  - source: quay.io/openshift-release-dev/ocp-release
    mirrors:
      - registry.local:5000/ocp-release
  - source: quay.io/openshift-release-dev/ocp-v4.0-art-dev
    mirrors:
      - registry.local:5000/ocp-v4.0-art-dev
