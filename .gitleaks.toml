# Allowlist only. Gitleaks uses default rules; this file prevents obvious false positives.
# Do not add rules here that weaken secret detection.
[allowlist]
description = "Test fixtures, mock data, schema placeholders; OKD dummy pull secret (auth only)"
paths = [
  "frontend/tests/fixtures/",
  "backend/mock-data/",
  "schema/"
]
# OKD-documented dummy for unauthenticated registry (https://github.com/orgs/okd-project/discussions/1930).
# Only this exact value is allowlisted; no other pull-secret content is permitted.
stopwords = ["aWQ6cGFzcwo="]
